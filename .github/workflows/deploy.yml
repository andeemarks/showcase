name: Deploy to Render

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Trigger Render deploy for CI-tested commit
        run: curl --fail --silent --show-error "${{ secrets.RENDER_DEPLOY_HOOK_URL }}?ref=${{ github.event.workflow_run.head_sha }}"
